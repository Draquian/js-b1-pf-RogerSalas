<!DOCTYPE html>

<body>
    <button class="user-btn" onclick="LogOut()">

    <div id="productosContainer"></div>

    <script src="../loginCheck.js"></script>
    <script src="../class/user.js"></script>
    <script src="../class/product.js"></script>
